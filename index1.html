<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Student</title>
    <link rel="stylesheet" href="students.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="students-add" data-page="add">
    <header class="head">
      <h1>ADD NEW STUDENT</h1>
    </header>

    <main class="mymain">
      <form class="add_student">
        <i class="bx bxs-face icon1"></i>
        <label for="id">ID</label>
        <input
          id="id"
          class="id same"
          type="text"
          name="ID"
          placeholder="enter ID like 2424001.."
          maxlength="12"
          required
        />

        <label for="first name"> First Name </label>
        <input
          id="first name"
          class="fname same"
          type="text"
          name="fname"
          placeholder="enter First Name"
          required
        />

        <label for="last name"> Last Name </label>
        <input
          id="last name"
          class="lname same"
          type="text"
          name="lname"
          placeholder="enter Last Name"
          required
        />
        <div class="choose_gender">
          <label>Gender:</label>
          <input
            class="gender"
            id="male"
            type="radio"
            name="gender"
            value="male"
          />
          <label for="male">Male</label>
          <input
            class="gender"
            id="female"
            type="radio"
            name="gender"
            value="female"
          />
          <label for="female">Female </label>
        </div>
        <label for="date">Date</label>
        <input
          class="date same1"
          id="date"
          type="date"
          name="date"
          value="date"
          required
        />

        <label for="average"> Average </label>
        <input
          id="average"
          class="average same1"
          type="number"
          placeholder="enter Average"
          name="average"
          min="0"
          max="20"
          required
        />

        <button type="submit" id="add" value="send registration">ADD</button>
      </form>
    </main>

    <footer class="myfooter"></footer>

    <script src="students.js"></script>
  </body>
</html>
